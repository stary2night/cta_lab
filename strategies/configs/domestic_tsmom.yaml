# 国内期货趋势跟踪策略（DomesticTSMOM）配置
#
# 参数说明：
#   lookbacks       回望周期（交易日）。cta_lab 默认四尺度 [21,63,126,252]；
#                   cta 原始研究使用三尺度 [22,66,260]（对应 1m/3m/12m）。
#   signal_weights  各 lookback 等权合成，sum=1。
#   vol_halflife    EWMA 波动率半衰期（交易日），cta 研究验证值为 60（约 3 个月）。
#   target_vol      年化目标波动率，用于仓位杠杆缩放。
#   universe        品种集合标识，供 DataLoader 映射到具体品种列表。
#   rebalance_freq  再平衡频率（monthly = 月末调仓，signal 月末取值前向填充）。

lookbacks: [21, 63, 126, 252]
signal_weights: [0.25, 0.25, 0.25, 0.25]
vol_halflife: 60
target_vol: 0.40
universe: domestic_futures_main
rebalance_freq: monthly
